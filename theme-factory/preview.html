<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-color-theme="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Factory Preview</title>
    <link rel="stylesheet" href="theme-factory.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px;
            transition: all 0.3s ease;
        }
        
        .preview-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 40px;
            background: var(--theme-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .section {
            margin-bottom: 40px;
        }
        
        h2 {
            margin-bottom: 20px;
            color: var(--text-secondary);
        }
        
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        
        .theme-card {
            padding: 20px;
            border-radius: 12px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .theme-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }
        
        .theme-card.active {
            border-color: var(--theme-primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }
        
        .theme-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin: 0 auto 12px;
        }
        
        .theme-name {
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .mode-btn {
            padding: 12px 32px;
            border: 2px solid var(--theme-primary);
            border-radius: 30px;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .mode-btn.active {
            background: var(--theme-gradient);
            color: white;
        }
        
        .demo-card {
            padding: 30px;
            border-radius: 16px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }
        
        .demo-button {
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            background: var(--theme-gradient);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .demo-button:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="preview-container">
        <h1>🎨 Theme Factory Preview</h1>
        
        <div class="mode-toggle">
            <button class="mode-btn active" onclick="setMode('light')">☀️ Light Mode</button>
            <button class="mode-btn" onclick="setMode('dark')">🌙 Dark Mode</button>
        </div>
        
        <div class="section">
            <h2>Choose a Color Theme</h2>
            <div class="theme-grid" id="themeGrid"></div>
        </div>
        
        <div class="section">
            <h2>Preview</h2>
            <div class="demo-card">
                <h3 style="margin-bottom: 16px;">Sample Card</h3>
                <p style="margin-bottom: 20px; color: var(--text-secondary);">
                    This is a sample card with glass morphism effect using the current theme colors.
                </p>
                <button class="demo-button">Primary Button</button>
            </div>
        </div>
    </div>
    
    <script src="theme-factory.js"></script>
    <script>
        const factory = new ThemeFactory({
            onThemeChange: updateUI,
            onModeChange: updateModeUI
        }).init();
        
        const themes = factory.getThemes();
        const themeGrid = document.getElementById('themeGrid');
        
        // Generate theme cards
        themes.forEach(theme => {
            const config = factory.themes[theme];
            const card = document.createElement('div');
            card.className = 'theme-card' + (theme === factory.currentTheme ? ' active' : '');
            card.onclick = () => factory.setTheme(theme);
            card.innerHTML = `
                <div class="theme-preview" style="background: ${config.gradient};"></div>
                <div class="theme-name">${theme.replace('-', ' ')}</div>
            `;
            themeGrid.appendChild(card);
        });
        
        function updateUI(name) {
            document.querySelectorAll('.theme-card').forEach((card, i) => {
                card.classList.toggle('active', themes[i] === name);
            });
        }
        
        function updateModeUI(mode) {
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.toggle('active', 
                    (mode === 'light' && btn.textContent.includes('Light')) ||
                    (mode === 'dark' && btn.textContent.includes('Dark'))
                );
            });
        }
        
        function setMode(mode) {
            factory.setMode(mode);
        }
    </script>
</body>
</html>
